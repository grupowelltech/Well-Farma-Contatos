    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #31a7b6;
            background: radial-gradient(circle at center, #31a7b6 0%, #006377 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 75%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
        }

        .header-img {
            width: 15%;
            height: auto;
            object-fit: cover;
            display: block;
            margin-top: 5rem;
            margin-bottom: 3rem;
        }

        .profile-section {
            width: 100%;
            background-color: #326b7a;
            overflow: hidden;
            white-space: nowrap;
            padding: 0px 5px;
        }

        .strong{
            color: #ff9504;
            font-weight: 800;
        }

        .strong-bold{
            font-weight: 800;
        }

        .subtitle {
            display: inline-block;
            margin: 0;
            font-size: .8rem;
            font-weight: 200;
            padding-left: 100%;
            animation: marquee 18s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #main {
            width: 30vw;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-row { display: flex; gap: 10px; width: 100%; }
        .text-group { display: flex; flex-direction: column; align-items: flex-start; }
        .store-status { font-size: 0.65rem; font-weight: 600; }
        .status-closed { opacity: 0.25; }


        .btn-link {
            flex-grow: 1;
            background-color: #326b7a;
            color: #ffffff;
            font-weight: 300;
            text-decoration: none;
            padding: .6rem 1.4rem;
            border-radius: 10rem;
            transition: background-color 0.5s, transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1.2rem;
            box-shadow: 0 4px 0px #1b4753;
        }

        .btn-link svg {
            flex-shrink: 0;
            transition: color 0.3s, filter 0.3s;
        }

        .btn-link:hover svg {
            color: #ff9504;
        }

        .btn-link:hover {
            background-color: #275662;
            transform: translateY(-2px);
        }

        .socials {
            margin-top: 40px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .footer {
            margin: 0;
            text-align: center;
            font-weight: 200;
            font-size: .85rem;
        }

        .social-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #326b7a;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s, transform 0.2s;
        }

        .social-icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .social-icon:hover {
            background-color: #275662;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header-img {
                width: 50%;
            }
            #main {
                width: 90vw;
            }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            const isOpen = day >= 1 && day <= 6 && hour >= 6 && hour < 21;
            document.querySelectorAll('.store-status').forEach(el => {
                if(isOpen) el.textContent = 'Aberto';
                else {
                    el.textContent = 'Fechado';
                    el.classList.add('status-closed');
                }
            });
        });
